<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секретный архив</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #000000;
      --green: #39ff66;
      --green-soft: rgba(57, 255, 102, 0.18);
      --green-muted: #118c2c;
      --green-pale: #b9ffc7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--background);
    }

    body {
      overflow: hidden;
      color: var(--green);
      font-family: "Courier New", Courier, monospace;
      font-size: clamp(15px, 1.8vw, 20px);
      line-height: 1.45;
    }

    .terminal {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(18px, 3.5vw, 42px);
      overflow-y: auto;
      background:
        radial-gradient(circle at 50% 50%, rgba(24, 255, 88, 0.08), transparent 34%),
        #000000;
      cursor: text;
      text-shadow: 0 0 7px rgba(57, 255, 102, 0.78);
    }

    .terminal::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(57, 255, 102, 0.08) 50%, rgba(0, 0, 0, 0.12) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 6px 100%;
      mix-blend-mode: screen;
      opacity: 0.38;
    }

    .terminal::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.95);
    }

    .archive-header {
      margin-bottom: 1.4rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--green-muted);
      color: var(--green-pale);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .archive-header span {
      color: var(--green-muted);
    }

    .history {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 12rem);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .line {
      min-height: 1.45em;
    }

    .line.command {
      color: var(--green-pale);
    }

    .line.system {
      color: var(--green);
    }

    .line.denied {
      color: var(--green);
    }

    .line a {
      color: var(--green-pale);
      text-decoration: underline;
      text-underline-offset: 0.24em;
    }

    .input-line {
      position: relative;
      z-index: 1;
      min-height: 1.45em;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .prompt {
      color: var(--green-pale);
    }

    .command-input {
      display: inline-block;
      min-width: 1ch;
      outline: none;
      vertical-align: baseline;
    }

    .command-input:focus {
      outline: none;
    }

    .cursor {
      display: inline-block;
      width: 0.65ch;
      height: 1em;
      margin-left: 0.12ch;
      transform: translateY(0.16em);
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: cursor-blink 1s steps(1, end) infinite;
    }

    ::selection {
      color: #000000;
      background: var(--green);
      text-shadow: none;
    }

    @keyframes cursor-blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 15px;
      }

      .terminal {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <!-- SOURCE TRACE:
01010101 01111001 01101101 01101000 00100000
01010001 01100101 01110110 01100111 01111001 01110111 00100000
01000101 01111001 01110110 01101001 01110000 01101101 01111001 01110111 00100000
01100111 01110011 01101011 01101101 01111000 01100101 01100110 01100101 01111000 00100000
01100111 01111001 01110001 00100000
01110000 01101101 01100110 01110110 01111001 01110001 00100000
01110111 01111001 01111001 01110001 00100000
01110111 01100111 01101101 01100110 01101001 01110110 01101001 01111000 00111111
  -->
  <main class="terminal" id="terminal" aria-label="Консоль секретного архива">
    <div class="archive-header">
      ARCHIVE://hidden-knowledge <span>NODE 07 / READ-ONLY SEARCH CHANNEL</span>
    </div>
    <section class="history" id="history" aria-live="polite"></section>
    <div class="input-line">
      <span class="prompt">&gt;</span>
      <span id="commandInput" class="command-input" contenteditable="true" spellcheck="false" role="textbox" aria-label="Командная строка"></span><span class="cursor" aria-hidden="true"></span>
    </div>
  </main>

  <script>
    const historyElement = document.querySelector("#history");
    const terminalElement = document.querySelector("#terminal");
    const commandInputElement = document.querySelector("#commandInput");
    const textDecoder = new TextDecoder();

    const secretRegistry = new Map([
      ["archive-fragment-1", {
        payload: "bTEyOtGL0YHRi9C/0YHQoA==",
        shift: 9,
        salt: "m12",
        messages: [
          "Boek 12, reël 17",
        ]
      }],
      ["archive-fragment-2", {
        payload: "ZDg6O256f3ZzLcKAwoJvcn8twoDCgm92e3p8LXt2LXx2woFuf3Z9woBuLW7CgsKBLcKBdmAtO3J/cnB2cS12eXx7LTl6woJ/csKDLcKBwoByLXt8ey12woAtSHJ/cnBucy12eXx7LTl6woLCgcKAwoJ2LcKBwoByLXt8ey12YA==",
        shift: 13,
        salt: "d8",
        messages: [
          "NODE 08 найден.",
          { text: "duck.html", href: "duck.html" }
        ]
      }]
    ]);

    const bootLines = [
      "[ARCHIVE-07] Канал поиска скрытых знаний открыт.",
      "[INDEX] Часть каталога повреждена. Часть каталога помнит.",
      "[INPUT] Введите help, если умеете спрашивать тишину."
    ];

    function writeText(text, type = "system") {
      const line = document.createElement("div");
      line.className = `line ${type}`;
      line.textContent = text;
      historyElement.append(line);
      scrollToBottom();
    }

    function writeLines(lines, type = "system") {
      lines.forEach((line) => {
        if (typeof line === "string") {
          writeText(line, type);
          return;
        }

        writeLink(line.text, line.href, type);
      });
    }

    function writeLink(text, href, type = "system") {
      const line = document.createElement("div");
      const link = document.createElement("a");
      line.className = `line ${type}`;
      link.textContent = text;
      link.href = href;
      line.append(link);
      historyElement.append(line);
      scrollToBottom();
    }

    function clearConsole() {
      historyElement.replaceChildren();
      scrollToBottom();
    }

    function decodeBase64(payload) {
      const binary = atob(payload);
      const bytes = Uint8Array.from(binary, (character) => character.charCodeAt(0));
      return textDecoder.decode(bytes);
    }

    function decryptKey(secret) {
      const decodedPayload = decodeBase64(secret.payload);
      const separatorIndex = decodedPayload.indexOf(":");

      if (separatorIndex === -1) {
        return "";
      }

      const salt = decodedPayload.slice(0, separatorIndex);
      const transformed = decodedPayload.slice(separatorIndex + 1);

      if (salt !== secret.salt) {
        return "";
      }

      return Array.from(transformed)
        .reverse()
        .map((character) => String.fromCodePoint(character.codePointAt(0) - secret.shift))
        .join("");
    }

    function normalizeCommand(command) {
      return command.normalize("NFKC").trim().toLowerCase();
    }

    function findMatchingSecret(command) {
      const normalizedCommand = normalizeCommand(command);

      for (const secret of secretRegistry.values()) {
        if (normalizeCommand(decryptKey(secret)) === normalizedCommand) {
          return secret;
        }
      }

      return null;
    }

    function handleCommand(rawCommand) {
      const command = normalizeCommand(rawCommand);

      if (!command) {
        return;
      }

      if (command === "help") {
        writeLines([
          "Ответы скрыты среди загадок. Архив не хранит путь, он хранит отголосок.",
          "Первый след хранит имя автора. Второй след шепчет по-латыни про утку."
        ]);
        return;
      }

      if (command === "clear") {
        clearConsole();
        return;
      }

      const secret = findMatchingSecret(command);

      if (secret) {
        writeLines(secret.messages);
        return;
      }

      writeText("ACCESS DENIED", "denied");
    }

    function submitCommand() {
      const rawCommand = commandInputElement.textContent || "";

      if (!rawCommand.trim()) {
        commandInputElement.textContent = "";
        return;
      }

      writeText(`> ${rawCommand}`, "command");
      commandInputElement.textContent = "";
      handleCommand(rawCommand);
    }

    function focusInput() {
      commandInputElement.focus({ preventScroll: true });
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(commandInputElement);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function scrollToBottom() {
      terminalElement.scrollTop = terminalElement.scrollHeight;
    }

    commandInputElement.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.isComposing) {
        event.preventDefault();
        submitCommand();
      }

      if (event.key === "Tab") {
        event.preventDefault();
      }
    });

    commandInputElement.addEventListener("paste", (event) => {
      event.preventDefault();
      const pastedText = event.clipboardData.getData("text/plain").replace(/\s+/g, " ");
      const selection = window.getSelection();

      if (!selection.rangeCount) {
        return;
      }

      selection.deleteFromDocument();
      selection.getRangeAt(0).insertNode(document.createTextNode(pastedText));
      selection.collapseToEnd();
    });

    terminalElement.addEventListener("mousedown", () => {
      window.setTimeout(focusInput, 0);
    });

    writeLines(bootLines, "system");
    focusInput();
  </script>
</body>
</html>
